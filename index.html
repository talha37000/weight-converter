<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Weight Converter</title>
</head>

<body>
    <div class="container">
        <h1 class="heading">Weight Converter</h1>
        <div class="input-container">
            <label>Pounds:</label>
            <input type="number" class="number" id="number" placeholder="Enter Your Weight" step="2">
        </div>
        <p id="resultinp" class="resultinp">Your Weight in Pounds is:<span id="result"> </span></p>
        <p id="error" class="error"></p>
        <script src="index.js"></script>
    </div>
</body>

</html>
