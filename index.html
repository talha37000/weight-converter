<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeightLink | Smart Converter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="neumorphic-card">
        <h1 class="heading">WeightLink</h1>

        <div class="input-section">
            <label for="number">Pounds (lbs)</label>
            <input type="number" id="number" placeholder="0.00" step="0.1">
        </div>

        <div class="results-grid">
            <div class="result-box">
                <span class="unit-label">Kilograms</span>
                <p id="kg-res">0.00</p>
            </div>
            <div class="result-box">
                <span class="unit-label">Grams</span>
                <p id="gm-res">0</p>
            </div>
            <div class="result-box">
                <span class="unit-label">Ounces</span>
                <p id="oz-res">0.00</p>
            </div>
        </div>

        <p id="error" class="error-msg"></p>
    </div>
    <script src="index.js"></script>
</body>

</html>
